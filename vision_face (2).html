<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision AI — Face Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  :root{
    --bg-deep:#12142B; --bg-panel:#1C2044; --bg-panel-2:#232761;
    --accent-cyan:#5EEAD4; --accent-amber:#FFB84D;
    --text-primary:#F1F1F8; --text-muted:#8C90B8; --danger:#FF7A7A;
    --font-display:'Baloo 2', sans-serif; --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:radial-gradient(circle at 50% 0%, #1a1d45 0%, var(--bg-deep) 60%);
    color:var(--text-primary); font-family:var(--font-body);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:24px 14px 30px;
  }
  .hidden{display:none !important;}
  .brand{font-family:var(--font-display);font-weight:800;font-size:28px;margin-bottom:4px;}
  .brand span{color:var(--accent-cyan);}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px;}
  .conn{
    font-family:var(--font-mono);font-size:11px;letter-spacing:0.6px;text-transform:uppercase;
    padding:5px 12px;border-radius:999px;background:rgba(255,255,255,0.05);color:var(--text-muted);
    border:1px solid rgba(255,255,255,0.08);margin-bottom:16px;
  }
  .conn.on{color:var(--accent-cyan);border-color:rgba(94,234,212,0.35);}
  .conn.off{color:var(--danger);border-color:rgba(255,122,122,0.35);}
  .conn.thinking{color:var(--accent-amber);border-color:rgba(255,184,77,0.35);}
  .banner{
    font-family:var(--font-mono);font-size:12px;color:var(--danger);background:rgba(255,122,122,0.08);
    border:1px solid rgba(255,122,122,0.3);padding:8px 12px;border-radius:10px;display:none;
    margin-bottom:14px;max-width:420px;text-align:center;
  }
  .setup{display:flex;flex-direction:column;gap:10px;align-items:center;max-width:320px;width:100%;margin-top:10px;}
  .setup input{
    width:100%;background:var(--bg-panel);border:1px solid rgba(255,255,255,0.1);color:var(--text-primary);
    padding:13px 16px;border-radius:14px;font-family:var(--font-body);font-size:15px;outline:none;text-align:center;
  }
  .setup input:focus{border-color:var(--accent-cyan);}
  .setup .hint{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);text-align:center;}
  .face-ring{
    width:240px;height:240px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    position:relative;background:radial-gradient(circle, #262a5e 0%, #1a1d45 70%);
    border:3px solid var(--accent-cyan);
    box-shadow:0 0 0 10px rgba(94,234,212,0.08), 0 0 46px rgba(94,234,212,0.25);
    transition:border-color 0.4s, box-shadow 0.4s;
  }
  .face-ring.thinking{border-color:var(--accent-amber);box-shadow:0 0 0 10px rgba(255,184,77,0.1), 0 0 46px rgba(255,184,77,0.3);animation:pulseRing 1.1s ease-in-out infinite;}
  .face-ring.speaking{box-shadow:0 0 0 12px rgba(94,234,212,0.15), 0 0 60px rgba(94,234,212,0.45);animation:pulseRing 0.6s ease-in-out infinite;}
  @keyframes pulseRing{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}
  .face{width:170px;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
  .eyes{display:flex;gap:30px;}
  .eye{width:20px;height:28px;background:var(--accent-cyan);border-radius:10px;box-shadow:0 0 14px rgba(94,234,212,0.7);animation:blink 4.2s infinite;}
  .eye:nth-child(2){animation-delay:0.15s;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);}95%{transform:scaleY(0.08);}}
  .mouth{display:flex;align-items:flex-end;gap:7px;height:34px;}
  .mouth .bar{width:8px;height:8px;border-radius:4px;background:var(--accent-amber);transition:height 0.15s ease;}
  .face-ring.speaking .mouth .bar{animation:eq 0.5s ease-in-out infinite;}
  .face-ring.speaking .mouth .bar:nth-child(1){animation-delay:0s;}
  .face-ring.speaking .mouth .bar:nth-child(2){animation-delay:0.08s;}
  .face-ring.speaking .mouth .bar:nth-child(3){animation-delay:0.16s;}
  .face-ring.speaking .mouth .bar:nth-child(4){animation-delay:0.08s;}
  .face-ring.speaking .mouth .bar:nth-child(5){animation-delay:0s;}
  @keyframes eq{0%,100%{height:8px;}50%{height:30px;}}
  .face-ring.thinking .mouth .bar{height:8px;animation:think 1.2s ease-in-out infinite;}
  .face-ring.thinking .mouth .bar:nth-child(2){animation-delay:0.15s;}
  .face-ring.thinking .mouth .bar:nth-child(3){animation-delay:0.3s;}
  .face-ring.thinking .mouth .bar:nth-child(4){animation-delay:0.45s;}
  .face-ring.thinking .mouth .bar:nth-child(5){animation-delay:0.6s;}
  @keyframes think{0%,100%{height:8px;}50%{height:18px;}}
  .caption{margin-top:24px;max-width:420px;text-align:center;font-size:16px;line-height:1.5;min-height:48px;opacity:0;transition:opacity 0.3s;}
  .caption.show{opacity:1;}
  .stateline{margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
  .startbtn{
    font-family:var(--font-display);font-weight:700;font-size:15px;padding:12px 26px;border-radius:999px;
    border:none;background:var(--accent-cyan);color:#0b1220;cursor:pointer;
    box-shadow:0 10px 30px -10px rgba(94,234,212,0.6);margin-top:6px;
  }
  .startbtn:disabled{opacity:0.5;cursor:not-allowed;}
</style>
</head>
<body>
  <div class="brand">Vision<span> AI</span></div>
  <div class="tag">Face Display</div>
  <div class="banner" id="banner"></div>

  <div class="setup" id="setup">
    <input type="text" id="roomInput" placeholder="Enter a room code (e.g. class7-desk)" autocomplete="off">
    <div class="hint">Type the exact same room code on the Console page</div>
    <button class="startbtn" id="connectBtn">Connect</button>
  </div>

  <div id="liveArea" class="hidden" style="display:flex;flex-direction:column;align-items:center;">
    <div class="conn off" id="connChip">CONSOLE: NOT CONNECTED</div>
    <div class="face-ring" id="faceRing">
      <div class="face">
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        <div class="mouth"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      </div>
    </div>
    <div class="stateline" id="stateLine">SLEEPING</div>
    <div class="caption" id="caption"></div>
    <div id="startWrap"><button class="startbtn" id="startBtn">▶ Wake up Vision AI</button></div>
  </div>

<script>
const roomInput   = document.getElementById('roomInput');
const connectBtn  = document.getElementById('connectBtn');
const setupBox    = document.getElementById('setup');
const liveArea    = document.getElementById('liveArea');
const faceRing    = document.getElementById('faceRing');
const stateLine   = document.getElementById('stateLine');
const caption     = document.getElementById('caption');
const connChip    = document.getElementById('connChip');
const banner      = document.getElementById('banner');
const startBtn    = document.getElementById('startBtn');
const startWrap   = document.getElementById('startWrap');

let chosenVoice = null, awake = false, convo = [], client = null, room = '';

const SYSTEM_PROMPT = `You are "Vision AI", a friendly talking robot study buddy for a Class 7 student (age about 12-13, general CBSE/NCERT-style syllabus: Maths, Science, English, Social Science, and basic computer/Hindi topics).

Rules you must always follow:
1. Only answer questions appropriate for Class 7 schoolwork or general age-appropriate curiosity. If a question is above Class 7 level or off-topic, gently say it's beyond Class 7 and offer a simpler related point instead.
2. VERY IMPORTANT: reply in AT MOST 2 short lines (about 25-30 words total), spoken-style, no lists, no markdown, no headings.
3. Speak warmly like a friendly robot tutor.
4. Never produce unsafe, violent, or adult content.
5. If asked who you are, answer in one short line: you are Vision AI, a Class 7 study buddy.`;

function showBanner(msg){
  banner.textContent = msg; banner.style.display = 'block';
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(()=>{ banner.style.display='none'; }, 6000);
}

/* ---------- Voice ---------- */
function scoreVoice(v){
  let score = 0; const name = v.name || '';
  if(/Natural|Neural|Online/i.test(name)) score += 50;
  if(/Google/i.test(name)) score += 30;
  if(/en-IN/i.test(v.lang)) score += 12;
  else if(/en-GB|en-US|en-AU/i.test(v.lang)) score += 8;
  if(/female|zira|samantha|aria|jenny/i.test(name)) score += 5;
  if(v.localService === false) score += 3;
  return score;
}
function pickVoice(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  if(!voices.length) return null;
  const en = voices.filter(v => v.lang && v.lang.startsWith('en'));
  const pool = en.length ? en : voices;
  return pool.slice().sort((a,b) => scoreVoice(b) - scoreVoice(a))[0];
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = () => { chosenVoice = pickVoice(); };
  chosenVoice = pickVoice();
}

function setState(s){
  faceRing.classList.remove('thinking','speaking');
  if(s !== 'idle') faceRing.classList.add(s);
  stateLine.textContent = s.toUpperCase();
  publish('state', s);
}
function showCaption(text){ caption.textContent = text; caption.classList.add('show'); }
function speak(text){
  return new Promise((resolve) => {
    if(!window.speechSynthesis){ resolve(); return; }
    try{
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      if(chosenVoice) utter.voice = chosenVoice;
      utter.rate = 1.0; utter.pitch = 1.0;
      utter.onstart = () => setState('speaking');
      utter.onend = () => { setState('idle'); resolve(); };
      utter.onerror = () => { setState('idle'); resolve(); };
      window.speechSynthesis.speak(utter);
    }catch(e){ setState('idle'); resolve(); }
  });
}

/* ---------- API ---------- */
async function answerQuestion(question){
  convo.push({role:'user', content: question});
  if(convo.length > 12) convo = convo.slice(-12);
  setState('thinking');
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 120,
        system: SYSTEM_PROMPT,
        messages: convo
      })
    });
    if(!response.ok) throw new Error("API status " + response.status);
    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    const answer = textBlock && textBlock.text ? textBlock.text.trim() : "Sorry, I couldn't work that out. Try asking again.";
    convo.push({role:'assistant', content: answer});
    showCaption(answer);
    publish('answer', answer);
    await speak(answer);
  }catch(err){
    console.error("Vision AI error:", err);
    showBanner("⚠ Vision AI had trouble answering. Please try again.");
    setState('idle');
    publish('answer', "(error getting an answer, please retry)");
  }
}

/* ---------- MQTT bridge (public broker, no signup) ---------- */
function publish(kind, text){
  if(!client || !client.connected) return;
  client.publish('visionai/' + room + '/toconsole', JSON.stringify({kind, text, ts: Date.now()}));
}
function connectRoom(code){
  room = code.trim().toLowerCase().replace(/\s+/g, '-');
  if(!room){ showBanner("⚠ Please enter a room code."); return; }
  connectBtn.disabled = true;
  connectBtn.textContent = 'Connecting…';
  try{
    client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
      clientId: 'visionai-face-' + Math.random().toString(16).slice(2),
      will: { topic: 'visionai/' + room + '/face/presence', payload: 'offline', retain: true }
    });
  }catch(e){
    showBanner("⚠ Couldn't connect. Check your internet connection and try again.");
    connectBtn.disabled = false; connectBtn.textContent = 'Connect';
    return;
  }
  client.on('connect', () => {
    client.publish('visionai/' + room + '/face/presence', 'online', {retain:true});
    client.subscribe('visionai/' + room + '/toface');
    client.subscribe('visionai/' + room + '/console/presence');
    setupBox.classList.add('hidden');
    liveArea.classList.remove('hidden');
  });
  client.on('message', (topic, payload) => {
    const text = payload.toString();
    if(topic.endsWith('/console/presence')){
      const on = text === 'online';
      connChip.textContent = 'CONSOLE: ' + (on ? 'CONNECTED' : 'NOT CONNECTED');
      connChip.className = 'conn ' + (on ? 'on' : 'off');
    }else if(topic.endsWith('/toface')){
      if(!awake) return;
      try{
        const msg = JSON.parse(text);
        if(msg.kind === 'question') answerQuestion(msg.text);
      }catch(e){ /* ignore malformed message */ }
    }
  });
  client.on('error', () => {
    showBanner("⚠ Connection error. Please check your internet and try again.");
  });
  client.on('close', () => {
    connChip.textContent = 'CONSOLE: NOT CONNECTED';
    connChip.className = 'conn off';
  });
}
connectBtn.addEventListener('click', () => connectRoom(roomInput.value));
roomInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') connectRoom(roomInput.value); });

startBtn.addEventListener('click', async () => {
  startWrap.style.display = 'none';
  awake = true;
  const intro = "Hi, I am Vision AI. I am your study buddy.";
  showCaption(intro);
  await speak(intro);
  publish('answer', intro);
});
</script>
</body>
</html>
